<svg viewBox="-40 -40 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <path id="badgeArcMobile" d="M 71.9, 168.1 A 68,68 0 1,1 168.1, 168.1"></path>
  </defs>
  <g filter="url(#shadow)">
    <!-- Golden decorative rings -->
    <circle cx="120" cy="120" r="114" fill="white" stroke="#eab308" stroke-width="4"></circle>
    <circle cx="120" cy="120" r="108" fill="white" stroke="#eab308" stroke-width="1.5"></circle>
    <circle cx="120" cy="120" r="58" fill="white" stroke="#eab308" stroke-width="1.5"></circle>
    
    <!-- Central Taiji -->
    <g transform="translate(70, 70)">
      <circle cx="50" cy="50" r="49" fill="white" stroke="black" stroke-width="2"></circle>
      <mask id="taiji-mask">
        <!-- Right half visible -->
        <rect x="50" y="-10" width="60" height="120" fill="white"></rect>
        <!-- Top left bulge visible -->
        <circle cx="50" cy="25.5" r="24.5" fill="white"></circle>
        <!-- Bottom right bulge hidden -->
        <circle cx="50" cy="74.5" r="24.5" fill="black"></circle>
      </mask>
      <circle cx="50" cy="50" r="49" fill="black" mask="url(#taiji-mask)"></circle>
      <circle cx="50" cy="74.5" r="8" fill="white"></circle>
      <circle cx="50" cy="25.5" r="8" fill="black"></circle>
    </g>
    
    <!-- Circular Text wrapping around -->
    <text font-family="'BiauKai', 'DFKai-SB', 'PMingLiU', 'Noto Serif TC', serif" font-weight="900" font-size="38" fill="#dc2626">
      <textPath href="#badgeArcMobile" startOffset="50%" text-anchor="middle" letter-spacing="10">皇恩筆記本</textPath>
    </text>
    
    <!-- Bottom decorative elements: 9 dots arranged up and down (zigzag) and spread out -->
    <!-- Inner dots (5) -->
    <circle cx="120" cy="188" r="3.5" fill="#dc2626"></circle>
    <circle cx="120" cy="188" r="3.5" fill="#dc2626" transform="rotate(30, 120, 120)"></circle>
    <circle cx="120" cy="188" r="3.5" fill="#dc2626" transform="rotate(-30, 120, 120)"></circle>
    <circle cx="120" cy="188" r="3.5" fill="#dc2626" transform="rotate(60, 120, 120)"></circle>
    <circle cx="120" cy="188" r="3.5" fill="#dc2626" transform="rotate(-60, 120, 120)"></circle>
    
    <!-- Outer dots (4) -->
    <circle cx="120" cy="208" r="3.5" fill="#dc2626" transform="rotate(15, 120, 120)"></circle>
    <circle cx="120" cy="208" r="3.5" fill="#dc2626" transform="rotate(-15, 120, 120)"></circle>
    <circle cx="120" cy="208" r="3.5" fill="#dc2626" transform="rotate(45, 120, 120)"></circle>
    <circle cx="120" cy="208" r="3.5" fill="#dc2626" transform="rotate(-45, 120, 120)"></circle>
  </g>
</svg>
